name: pl-simple
nodes:

- name: brz
  source:
    data:
      _idx: [0, 1, 2]
      id: ["a", "b", "c"]
      x1: [1, 2, 3]
  sinks:
  - format: PARQUET
    path: "{tmp_path}/brz.parquet"

- name: slv
  source:
    node_name: brz
  transformer:
    nodes:
    - func_name: with_columns
      func_kwargs:
        y1: x1
    - expr: SELECT id, x1, y1 from {df}
  # sinks:
  # - format: PARQUET
  #   path: {tmp_path}/slv.parquet

- name: gld
  transformer:
    nodes:
    - expr: SELECT id, MAX(x1) AS max_x1 from {nodes.slv} GROUP BY id
  sinks:
  - format: PARQUET
    path: "{tmp_path}/gld.parquet"
