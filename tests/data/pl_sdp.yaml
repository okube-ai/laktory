name: pl-sdp
root_path: {tmp_path}
orchestrator:
  type: SPARK_DECLARATIVE_PIPELINE
  database: default

nodes:
- name: brz
  source:
    format: JSON
    path: {tmp_path}/brz_source/
  sinks:
  - table_name: brz
    format: PARQUET
  transformer:
    dataframe_api: NATIVE
    nodes:
    - func_name: withColumn
      func_args:
        - zero
        - F.lit(0.0)

- name: slv
  source:
    node_name: brz
  sinks:
  - table_name: slv
    format: PARQUET
  transformer:
    dataframe_api: NATIVE
    nodes:
    - func_name: withColumn
      func_args:
        - x2
        - F.col('x1')
