name: run-quickstart-dab

on:
  workflow_dispatch:
  workflow_call:

env:
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  CWD: ./run_quickstart_workflows_dab

jobs:

  # ── Deploy ─────────────────────────────────────────────────────────────────

  deploy-dab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          python-version: "3.12"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install Laktory
        run: |
          make install-with-dbks

      - name: make dir
        run: |
          mkdir -p ${{ env.CWD }}

      - name: create databricks.yml
        run: |
          cat > databricks.yml << 'EOF'
          bundle:
            name: quickstart-workflows-dab

          targets:
            dev:
              mode: development
              workspace:
                host: ${{ vars.DATABRICKS_HOST }}

          variables:
            catalog:
              default: main
            dab_workspace_root:
              default: ${workspace.root_path}
            laktory_pipelines_dir:
              default: ./laktory/pipelines

          sync:
            paths:
              - ./laktory
            include:
              - ./laktory/.build/**

          include:
            - resources/*.yml

          python:
            venv_path: ../.venv
            resources:
              - 'laktory.dab:build_resources'
          EOF
        working-directory: ${{ env.CWD }}

      - name: run quickstart
        run: |
          source ../.venv/bin/activate
          laktory quickstart -t workflows-dab
        working-directory: ${{ env.CWD }}

      - name: update stack
        run: |
          source ../.venv/bin/activate
          python ../.github/scripts/update_quickstart_stack.py ${{ github.ref }}
        working-directory: ${{ env.CWD }}

      - name: bundle deploy
        run: |
          source ../.venv/bin/activate
          databricks bundle deploy --target dev
        working-directory: ${{ env.CWD }}

  # ── Run jobs (parallel) ────────────────────────────────────────────────────

  run-job-tpch:
    needs: [deploy-dab]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: make dir
        run: |
          mkdir -p ${{ env.CWD }}

      - name: create databricks.yml
        run: |
          cat > databricks.yml << 'EOF'
          bundle:
            name: quickstart-workflows-dab

          targets:
            dev:
              mode: development
              workspace:
                host: ${{ vars.DATABRICKS_HOST }}
          EOF
        working-directory: ${{ env.CWD }}

      - name: run job tpch
        run: |
          databricks bundle run pl-tpch --target dev
        working-directory: ${{ env.CWD }}

  run-job-pl-taxi-trips:
    needs: [deploy-dab]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: make dir
        run: |
          mkdir -p ${{ env.CWD }}

      - name: create databricks.yml
        run: |
          cat > databricks.yml << 'EOF'
          bundle:
            name: quickstart-workflows-dab

          targets:
            dev:
              mode: development
              workspace:
                host: ${{ vars.DATABRICKS_HOST }}
          EOF
        working-directory: ${{ env.CWD }}

      - name: run job pl-taxi-trips
        run: |
          databricks bundle run pl-taxi-trips --target dev
        working-directory: ${{ env.CWD }}

  # ── Destroy ────────────────────────────────────────────────────────────────
  # Runs if deploy-dab succeeded, even if run jobs failed.

  destroy-dab:
    needs: [deploy-dab, run-job-tpch, run-job-pl-taxi-trips]
    if: always() && needs.deploy-dab.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          python-version: "3.12"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install Laktory
        run: |
          make install-with-dbks

      - name: make dir
        run: |
          mkdir -p ${{ env.CWD }}

      - name: create databricks.yml
        run: |
          cat > databricks.yml << 'EOF'
          bundle:
            name: quickstart-workflows-dab

          targets:
            dev:
              mode: development
              workspace:
                host: ${{ vars.DATABRICKS_HOST }}

          variables:
            catalog:
              default: main
            dab_workspace_root:
              default: ${workspace.root_path}
            laktory_pipelines_dir:
              default: ./laktory/pipelines

          sync:
            paths:
              - ./laktory
            include:
              - ./laktory/.build/**

          include:
            - resources/*.yml

          python:
            venv_path: ../.venv
            resources:
              - 'laktory.dab:build_resources'
          EOF
        working-directory: ${{ env.CWD }}

      - name: run quickstart
        run: |
          source ../.venv/bin/activate
          laktory quickstart -t workflows-dab
        working-directory: ${{ env.CWD }}

      - name: update stack
        run: |
          source ../.venv/bin/activate
          python ../.github/scripts/update_quickstart_stack.py ${{ github.ref }} workflows-dab
        working-directory: ${{ env.CWD }}

      - name: bundle destroy
        run: |
          source ../.venv/bin/activate
          databricks bundle destroy --auto-approve --target dev
        working-directory: ${{ env.CWD }}
