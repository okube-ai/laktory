name: test

on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        pyVersion:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
        sparkVersion:
          - '4'
        include:
          - pyVersion: '3.12'
            sparkVersion: '3'
          - pyVersion: '3.12'
            sparkVersion: '41'
    steps:
      - name: Check if run tests
        env:
          VERSION_BUMP: ${{ contains(github.event.pull_request.labels.*.name, 'version-bump') }}
        run: |
          if ${VERSION_BUMP} == true; then
            echo "run_tests=false" >> $GITHUB_ENV
            echo "tests will be skipped"
          else
            echo "run_tests=true" >> $GITHUB_ENV
            echo "tests will be run"
          fi

      - name: Checkout
        if: ${{ env.run_tests == 'true' && success()}}
        uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        if: ${{ env.run_tests == 'true' && success()}}
        with:
          python-version: ${{ matrix.pyVersion }}

      - name: Set up Java 17
        if: ${{ env.run_tests == 'true' && success()}}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Terraform
        if: ${{ env.run_tests == 'true' && success()}}
        uses: hashicorp/setup-terraform@v3

      - name: Install uv
        if: ${{ env.run_tests == 'true' && success()}}
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          python-version: ${{ matrix.pyVersion }}

      - name: Install and Import with core dependencies only
        if: ${{ env.run_tests == 'true' && success()}}
        run: |
          make install 
          source .venv/bin/activate
          python -c "import laktory; print(laktory.__version__)" 
          laktory --version

      - name: Run tests
        if: ${{ env.run_tests == 'true' && success()}}
        run: |
          uv sync --all-extras
          if [[ "${{ matrix.sparkVersion }}" == "3" ]]; then
            .venv/bin/pip install -r .github/constraints/spark3.txt
          fi
          if [[ "${{ matrix.sparkVersion }}" == "41" ]]; then
            .venv/bin/pip install -r .github/constraints/spark41.txt
            uv run pytest tests/pipeline/orchestrators/test_orchestrator_sdp.py -v
          else
            make test
          fi
        env:

          # Terraform Preview
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

          # Unity Catalog Quickstart Preview
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DATABRICKS_ACCOUNT_ID: ${{ secrets.DATABRICKS_ACCOUNT_ID }}


#      - name: Publish test coverage
#        uses: codecov/codecov-action@v1
